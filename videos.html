<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vídeos Instrutivos - AVP Conecta</title>
  <link rel="icon" type="image/png" href="img/avp.png"/>
  <style>
    :root{
      --bg: #f4f4f4;
      --card-bg: #fff;
      --accent: #FFD700;
      --accent-hover: #FFC107;
      --text: #333;
      --shadow: rgba(0,0,0,0.12);
    }
    body { margin:0; font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text);}
    header { background:#fff; padding:18px 22px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 3px 10px var(--shadow);}
    .header-center { flex:1; text-align:center;}
    header h1 { margin:0; font-size:1.3rem; font-weight:600;}
    header img { height:52px;}
    .back-btn { background:var(--accent); padding:9px 14px; border-radius:8px; text-decoration:none; font-weight:700; color:#000; box-shadow:0 4px 10px var(--shadow);}
    .back-btn:hover { background:var(--accent-hover);}
    .container { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:22px; padding:36px; max-width:1200px; margin:0 auto;}
    .card { background:var(--card-bg); border-radius:12px; box-shadow:0 6px 18px var(--shadow); text-align:center; padding:26px 18px; transition:0.22s; cursor:pointer;}
    .card:hover { transform:translateY(-6px); box-shadow:0 12px 28px rgba(0,0,0,0.18);}
    .card h2 { margin-bottom:12px; font-size:1.2rem; color:#000;}
    .card p { margin-bottom:18px; color:rgba(0,0,0,0.7);}
    .cta { padding:10px 14px; background:var(--accent); color:#000; text-decoration:none; font-weight:700; border-radius:8px; transition:0.2s; display:inline-block;}
    .cta:hover { background:var(--accent-hover);}
    /* MODAL */
    .modal { display:none; position:fixed; z-index:999; inset:0; background:rgba(0,0,0,0.72); align-items:center; justify-content:center; padding:20px;}
    .modal.open { display:flex;}
    .modal-content { width:100%; max-width:900px; background:#fff; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; max-height:92vh;}
    .modal-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid rgba(0,0,0,0.06);}
    .modal-header h3 { margin:0; font-size:1.1rem;}
    .close { background:transparent; border:none; font-size:22px; cursor:pointer;}
    .video-wrapper { position:relative; width:100%; padding-top:56.25%; background:#000;}
    .video-wrapper video { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;}
    .modal-footer { padding:10px 16px; display:flex; justify-content:flex-end; border-top:1px solid rgba(0,0,0,0.06);}
    .btn { padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-weight:700;}
    .btn-close { background:#eee;}
    @media(max-width:600px){
      .container{grid-template-columns:1fr; padding:16px;}
      .card{padding:28px;}
      .modal-content{width:100%; height:100vh; border-radius:0;}
      .video-wrapper{padding-top:65%;}
    }
  </style>
</head>
<body>
  <header>
    <a class="back-btn" href="index.html">⬅ Voltar</a>
    <div class="header-center"><h1>Vídeos Instrutivos</h1></div>
    <img src="img/logo.png" alt="AVP Conecta Logo"/>
  </header>

  <main class="container">
    <div class="card" onclick="openModal('loginVideo')">
      <h2>🎥 Vídeo Login</h2>
      <p>Clique para assistir</p>
      <span class="cta">Assistir</span>
    </div>
    <div class="card" onclick="openModal('eventoVideo')">
      <h2>🎥 Vídeo Evento</h2>
      <p>Clique para assistir</p>
      <span class="cta">Assistir</span>
    </div>
    <div class="card" onclick="openModal('redefinirVideo')">
      <h2>🎥 Vídeo Redefinir Senha</h2>
      <p>Clique para assistir</p>
      <span class="cta">Assistir</span>
    </div>
  </main>

  <!-- MODAIS -->
  <div id="loginVideo" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Vídeo - Login</h3>
        <button class="close" onclick="closeModal('loginVideo')">&times;</button>
      </div>
      <div class="video-wrapper">
        <video id="video-login" controls>
