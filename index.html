<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuais AVP Conecta</title>
  <!-- Ícone da aba de navegação -->
  <link rel="icon" type="image/png" href="img/logo-icon.png">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }
    header {
      background-color: #000;
      color: #fff;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    header img {
      height: 60px;
      background: transparent; /* fundo transparente */
    }
    header h1 {
      font-weight: 400;
      margin: 0;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      padding: 30px 20px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }
    .card h2 {
      margin-bottom: 15px;
      font-size: 1.4em;
      color: #000;
    }
    .card a {
      display: inline-block;
      padding: 12px 20px;
      background-color: #FFD700; /* amarelo da logo */
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: background 0.3s;
    }
    .card a:hover {
      background-color: #FFC107; /* tom mais escuro no hover */
    }
  </style>
</head>
<body>
  <header>
    <!-- Logo com nome -->
    <img src="img/logo-avp.png" alt="AVP Conecta Logo">
    <h1>Manuais AVP Conecta</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>Perfil</h2>
      <a href="perfil">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>Login</h2>
      <a href="login">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>Evento</h2>
      <a href="evento">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>Comunicado</h2>
      <a href="comunicado">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>FAQ</h2>
      <a href="faq.html">Acessar Manual</a>
    </div>
  </div>
</body>
</html>
