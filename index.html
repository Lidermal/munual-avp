<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVP Conecta - Acessos</title>

  <link rel="icon" type="image/png" href="img/logo-icon.png">

  <style>
    :root {
      --bg: #f4f4f4;
      --text: #222;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(0,0,0,0.08);
      --accent: #FFD700;
      --accent-hover: #FFC107;
      --header-bg: #ffffff; /* HEADER BRANCO */
    }

    body.dark {
      --bg: #0f0f0f;
      --text: #f1f1f1;
      --card-bg: rgba(20, 20, 20, 0.6);
      --card-border: rgba(255,255,255,0.08);
      --accent: #FFD700;
      --accent-hover: #e0b600;
      --header-bg: #ffffff; /* HEADER CONTINUA BRANCO NO DARK MODE */
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
    }

    header {
      background-color: var(--header-bg);
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      transition: background 0.4s;
    }

    header .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    header img {
      height: 60px;
    }

    header h1 {
      margin: 0;
      font-weight: 500;
      letter-spacing: 1px;
      color: #000;
    }

    .theme-toggle {
      cursor: pointer;
      font-size: 1.9em;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .theme-toggle:hover {
      transform: scale(1.15);
    }

    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 100%;
      max-width: 550px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      color: var(--accent);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .card-btn {
      display: inline-block;
      padding: 14px 22px;
      background: var(--accent);
      color: #000;
      font-weight: bold;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .card-btn:hover {
      background: var(--accent-hover);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-area">
      <img src="img/logo-avp.png" alt="AVP Conecta Logo">
      <h1>AVP Conecta</h1>
    </div>

    <div class="theme-toggle" id="themeToggle">🌙</div>
  </header>

  <div class="main">
    <div class="cards">

      <div class="card" onclick="location.href='manuais.html'">
        <div class="card-icon">📘</div>
        <div class="card-title">Manuais</div>
        <div class="card-desc">Acesse os guias e instruções do sistema</div>
        <a class="card-btn" href="manuais.html">Acessar</a>
      </div>

      <div class="card" onclick="window.open('https://avpconecta.com.br','_blank')">
        <div class="card-icon">🌐</div>
        <div class="card-title">Plataforma</div>
        <div class="card-desc">Entrar no ambiente oficial do AVP Conecta</div>
        <a class="card-btn" href="https://avpconecta.com.br" target="_blank">Acessar</a>
      </div>

    </div>
  </div>

  <script>
    const toggle = document.getElementById("themeToggle");
    const body = document.body;

    if (localStorage.getItem("theme") === "dark") {
      body.classList.add("dark");
      toggle.textContent = "☀️";
    }

    toggle.addEventListener("click", () => {
      body.classList.toggle("dark");

      if (body.classList.contains("dark")) {
        toggle.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        toggle.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    });
  </script>

</body>
</html>
