<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuais AVP Conecta</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      background-color: #000; /* fundo preto como no texto da logo */
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    header img {
      max-height: 60px;
      vertical-align: middle;
    }
    h1 {
      margin: 10px 0 0;
      font-weight: 400;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
    .card a {
      display: block;
      margin-top: 10px;
      padding: 12px;
      background-color: #FFD700; /* amarelo da logo */
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .card a:hover {
      background-color: #FFC107; /* tom mais escuro no hover */
    }
  </style>
</head>
<body>
  <header>
    <!-- Aqui você pode colocar a logo como imagem -->
    <img src="logo-avp.png" alt="AVP Conecta Logo">
    <h1>Manuais AVP Conecta</h1>
  </header>

  <div class="container">
    <div class="card">
      <h2>Perfil</h2>
      <a href="perfil">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>Login</h2>
      <a href="login">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>Evento</h2>
      <a href="evento">Acessar Manual</a>
    </div>
    <div class="card">
      <h2>Comunicado</h2>
      <a href="comunicado">Acessar Manual</a>
    </div>
  </div>
</body>
</html>
